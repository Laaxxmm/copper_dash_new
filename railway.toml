# Railway deployment config for CopperBook.
#
# One-time setup in the Railway dashboard:
#   1. New Project → Deploy from GitHub repo (or `railway up` from this folder).
#   2. Add a Volume to the service, mount path: /data
#   3. Set environment variables:
#        DATABASE_PATH = /data/copper.db     (database lives on the volume, survives deploys)
#        NIXPACKS_NODE_VERSION = 22          (node:sqlite needs Node 22+)
#        ADMIN_USER = admin                  (login username; default "admin")
#        ADMIN_PASSWORD = <your password>    (login password; default "admin123" — change it!)
#        AUTH_SECRET = <long random string>  (signs the session cookie)
#        SEED_DEMO = off                     (optional: boot with an empty register, no demo data)
#   4. Generate a public domain under Settings → Networking.
# On first boot the app creates its schema and loads demo data (unless SEED_DEMO=off).
# Sign in, look around, then Settings → Erase all data to start your real register clean.

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
